name: warehouse
description: TakEsep Склад — Warehouse analytics and inventory management app.

publish_to: 'none'

version: 2.1.8+44

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Ecosystem shared packages
  takesep_design_system:
    path: ../../packages/design_system
  takesep_core:
    path: ../../packages/core
  takesep_api_client:
    path: ../../packages/api_client

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Maps (2GIS visuals)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.12.0
  uuid: ^4.5.3

  # Firebase Push
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.0
  firebase_crashlytics: ^4.3.5

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Auth
  akjol_auth:
    path: ../../packages/akjol_auth

  file_picker: ^10.3.10
  image_picker: ^1.1.2
  crop_your_image: ^1.1.0
  local_auth: ^2.3.0
  url_launcher: ^6.2.6
  http: ^1.2.1
  geolocator: ^13.0.2
  audioplayers: ^6.1.0

  # Offline-first (PowerSync)
  powersync: ^1.11.0
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  mobile_scanner: ^7.2.0
  cached_network_image: ^3.3.1
  printing: ^5.13.3
  pdf: ^3.11.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.7
  inno_bundle: ^0.11.2
  image: ^4.8.0

flutter_launcher_icons:
  image_path: "assets/images/logo_square.png"
  ios: true
  android: true
  windows:
    generate: true
  macos:
    generate: true

msix_config:
  display_name: "TakEsep"
  publisher_display_name: "TakEsep"
  identity_name: "com.takesep.app"
  msix_version: "1.0.0.0"
  logo_path: "C:\\Project TakEsep\\TakEsep\\apps\\warehouse\\assets\\images\\logo_square.png"
  bgr_color: "#1A1A3E"

inno_bundle:
  id: "35CB0F42-F0A1-420E-B8D2-4E90B2FEE95A"
  name: TakEsep
  version: 1.0.1
  publisher: TakEsep
  executable_name: TakEsep.exe
  icon: windows/runner/resources/app_icon.ico
  setup_icon: windows/runner/resources/app_icon.ico

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
