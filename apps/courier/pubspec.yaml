name: courier
description: "AkJol Courier — доставка заказов"
publish_to: 'none'
version: 2.1.8+38

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  
  # AkJol единый аккаунт
  akjol_auth:
    path: ../../packages/akjol_auth
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  # Firebase Push
  firebase_core: ^3.8.0
  firebase_messaging: ^15.2.0
  
  # Local Notifications
  flutter_local_notifications: ^18.0.1
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # UI
  url_launcher: ^6.2.6
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  
  # Utils
  http: ^1.2.1
  intl: ^0.19.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
