name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggered on version tags like v2.0

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════
  # Build Windows Installer (TakEsep Warehouse)
  # ═══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: |
          cd apps/warehouse
          flutter pub get

      - name: Build Windows
        run: |
          cd apps/warehouse
          flutter build windows --release

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Download VC++ Redistributable
        run: |
          cd apps/warehouse
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"

      - name: Build Installer with build.iss
        run: |
          cd apps/warehouse
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "build.iss"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/warehouse/build/windows/x64/runner/Release/TakEsep_Setup.exe

  # ═══════════════════════════════════════════════
  # Build All Android APKs
  # ═══════════════════════════════════════════════
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # TakEsep Warehouse APK
      - name: Build TakEsep APK
        run: |
          cd apps/warehouse
          flutter pub get
          flutter build apk --release

      - name: Rename TakEsep APK
        run: |
          cp apps/warehouse/build/app/outputs/flutter-apk/app-release.apk TakEsep.apk

      # AkJol Go APK
      - name: Build AkJol Go APK
        run: |
          cd apps/courier
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol Go APK
        run: |
          cp apps/courier/build/app/outputs/flutter-apk/app-release.apk AkJol_Go.apk

      # AkJol APK
      - name: Build AkJol APK
        run: |
          cd apps/customer
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol APK
        run: |
          cp apps/customer/build/app/outputs/flutter-apk/app-release.apk AkJol.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            TakEsep.apk
            AkJol_Go.apk
            AkJol.apk

  # ═══════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: ./artifacts/android

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          BUILD=$(grep 'version:' apps/warehouse/pubspec.yaml | head -1 | sed 's/.*+//')
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TakEsep v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## TakEsep Экосистема v${{ steps.version.outputs.version }}

            ### 📦 Приложения
            - **TakEsep** — управление складом и продажами (Windows + Android)
            - **AkJol** — приложение для покупателей (Android)
            - **AkJol Go** — приложение для курьеров (Android)
            - **Веб-админка** — [axeronisd.github.io/TakEsep/admin.html](https://axeronisd.github.io/TakEsep/admin.html)

            ### 📥 Скачать
            | Приложение | Платформа | Файл |
            |---|---|---|
            | TakEsep | Windows | `TakEsep_Setup.exe` |
            | TakEsep | Android | `TakEsep.apk` |
            | AkJol | Android | `AkJol.apk` |
            | AkJol Go | Android | `AkJol_Go.apk` |
          files: |
            ./artifacts/windows/TakEsep_Setup.exe
            ./artifacts/android/TakEsep.apk
            ./artifacts/android/AkJol_Go.apk
            ./artifacts/android/AkJol.apk

      - name: Update Supabase app_versions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build_number }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep_Setup.exe"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep.apk"

          # Insert Windows version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"windows\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${WIN_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}"

          # Insert Android version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"android\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${APK_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}"

          echo "✅ Supabase updated with v${VERSION} (build ${BUILD})"
