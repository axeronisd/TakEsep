name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggered on version tags like v2.0

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════
  # Build Windows Installer (TakEsep Warehouse)
  # ═══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: |
          cd apps/warehouse
          flutter pub get

      - name: Build Windows
        run: |
          cd apps/warehouse
          flutter build windows --release

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Download VC++ Redistributable
        run: |
          cd apps/warehouse
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"

      - name: Build Installer with build.iss
        run: |
          cd apps/warehouse
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "build.iss"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/warehouse/build/windows/x64/runner/Release/TakEsep_Setup.exe

  # ═══════════════════════════════════════════════
  # Build All Android APKs (GitHub Releases / Sideload)
  # ═══════════════════════════════════════════════
  build-android-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # TakEsep Warehouse APK
      - name: Build TakEsep APK
        run: |
          cd apps/warehouse
          flutter pub get
          flutter build apk --release

      - name: Rename TakEsep APK
        run: |
          cp apps/warehouse/build/app/outputs/flutter-apk/app-release.apk TakEsep.apk

      # AkJol Pro APK
      - name: Build AkJol Pro APK
        run: |
          cd apps/courier
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol Pro APK
        run: |
          cp apps/courier/build/app/outputs/flutter-apk/app-release.apk AkJol_Pro.apk

      # AkJol APK
      - name: Build AkJol APK
        run: |
          cd apps/customer
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol APK
        run: |
          cp apps/customer/build/app/outputs/flutter-apk/app-release.apk AkJol.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            TakEsep.apk
            AkJol_Pro.apk
            AkJol.apk

  # ═══════════════════════════════════════════════
  # Build All Android AABs (Google Play Store)
  # ═══════════════════════════════════════════════
  build-android-aabs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android signing
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$UPLOAD_KEYSTORE_BASE64" ]; then
            echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
            for app in warehouse courier customer; do
              echo "storePassword=$KEYSTORE_PASSWORD" > apps/$app/android/key.properties
              echo "keyPassword=$KEY_PASSWORD" >> apps/$app/android/key.properties
              echo "keyAlias=$KEY_ALIAS" >> apps/$app/android/key.properties
              echo "storeFile=${{ github.workspace }}/upload-keystore.jks" >> apps/$app/android/key.properties
            done
            echo "✅ Android signing configured"
          else
            echo "⚠️ No signing secrets found — AABs will use debug signing"
          fi

      # TakEsep Warehouse AAB
      - name: Build TakEsep AAB
        run: |
          cd apps/warehouse
          flutter pub get
          flutter build appbundle --release

      - name: Rename TakEsep AAB
        run: |
          cp apps/warehouse/build/app/outputs/bundle/release/app-release.aab TakEsep.aab

      # AkJol Pro AAB
      - name: Build AkJol Pro AAB
        run: |
          cd apps/courier
          flutter pub get
          flutter build appbundle --release

      - name: Rename AkJol Pro AAB
        run: |
          cp apps/courier/build/app/outputs/bundle/release/app-release.aab AkJol_Pro.aab

      # AkJol AAB
      - name: Build AkJol AAB
        run: |
          cd apps/customer
          flutter pub get
          flutter build appbundle --release

      - name: Rename AkJol AAB
        run: |
          cp apps/customer/build/app/outputs/bundle/release/app-release.aab AkJol.aab

      - name: Upload AABs
        uses: actions/upload-artifact@v4
        with:
          name: android-aabs
          path: |
            TakEsep.aab
            AkJol_Pro.aab
            AkJol.aab

  # ═══════════════════════════════════════════════
  # Build iOS IPAs (App Store Connect)
  # ═══════════════════════════════════════════════
  build-ios:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
      IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
      IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64 }}
      IOS_PROVISIONING_PROFILE_COURIER_BASE64: ${{ secrets.COURIER_BASE64 }}
      IOS_PROVISIONING_PROFILE_WAREHOUSE_BASE64: ${{ secrets.WAREHOUSE_BASE64 }}
      COCOAPODS_DISABLE_STATS: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i xcode || true
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install iOS 26 SDK
        run: |
          echo "=== Installed SDKs ==="
          xcodebuild -showsdks | grep -i ios || true
          echo "=== Downloading iOS platform (if needed) ==="
          xcodebuild -downloadPlatform iOS || true
          echo "=== SDKs after download ==="
          xcodebuild -showsdks | grep -i ios || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            apps/customer/ios/Pods
            apps/courier/ios/Pods
            apps/warehouse/ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ github.sha }}
          restore-keys: ${{ runner.os }}-derived-

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Import Distribution Certificate
        if: ${{ env.IOS_DISTRIBUTION_P12_BASE64 != '' }}
        run: |
          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > ios_distribution.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import ios_distribution.p12 -t agg -k ~/Library/Keychains/build.keychain -P "$IOS_DISTRIBUTION_P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -s ~/Library/Keychains/build.keychain ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

      - name: Import Provisioning Profiles
        if: ${{ env.IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64 != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AkJolCustomer.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_COURIER_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AkJolPro.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_WAREHOUSE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/TakEsep.mobileprovision
          echo "✅ Provisioning profiles imported"

      # AkJol Customer iOS
      - name: Build AkJol iOS
        timeout-minutes: 15
        run: |
          cd apps/customer
          flutter pub get
                    if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            flutter build ios --release --no-codesign
            security unlock-keychain -p "" ~/Library/Keychains/build.keychain
            echo "=== Available signing identities ==="
            security find-identity -v -p codesigning ~/Library/Keychains/build.keychain
            IDENTITY=$(security find-identity -v -p codesigning ~/Library/Keychains/build.keychain | grep -E "Distribution|Developer" | head -1 | awk -F'"' '{print $2}')
            echo "Signing with: $IDENTITY"
            cp ~/Library/MobileDevice/Provisioning\ Profiles/AkJolCustomer.mobileprovision build/ios/iphoneos/Runner.app/embedded.mobileprovision
            # Extract entitlements from provisioning profile
            security cms -D -i build/ios/iphoneos/Runner.app/embedded.mobileprovision > /tmp/profile_customer.plist
            /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/profile_customer.plist > /tmp/entitlements_customer.plist
            # Sign all frameworks first (deep)
            find build/ios/iphoneos/Runner.app/Frameworks -name "*.framework" -o -name "*.dylib" | while read f; do
              codesign --force --sign "$IDENTITY" --timestamp=none "$f"
            done
            # Sign the main app with entitlements
            codesign --force --sign "$IDENTITY" --entitlements /tmp/entitlements_customer.plist --timestamp=none --options=runtime build/ios/iphoneos/Runner.app
            codesign --verify --verbose build/ios/iphoneos/Runner.app
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            # Add SwiftSupport folder (required by App Store)
            mkdir -p SwiftSupport/iphoneos
            # Strategy 1: Use swift-stdlib-tool if available
            if xcrun -find swift-stdlib-tool >/dev/null 2>&1; then
              echo "Using swift-stdlib-tool"
              xcrun swift-stdlib-tool --copy --platform iphoneos \
                --scan-executable Payload/Runner.app/Runner \
                --destination SwiftSupport/iphoneos/ 2>/dev/null || true
            fi
            # Strategy 2: Search known paths for Swift dylibs
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              echo "Searching for Swift libraries..."
              for SWIFT_PATH in \
                "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "$(xcode-select -p)/../Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.0.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos"; do
                if [ -d "$SWIFT_PATH" ] && [ "$(ls -A "$SWIFT_PATH"/libswift* 2>/dev/null)" ]; then
                  echo "Found Swift libs at: $SWIFT_PATH"
                  cp "$SWIFT_PATH"/libswift* SwiftSupport/iphoneos/ 2>/dev/null || true
                  break
                fi
              done
            fi
            # Strategy 3: Find anywhere in Xcode
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              echo "Deep search in Xcode..."
              find /Applications/Xcode* -path "*/iphoneos/libswift*" -type f 2>/dev/null | head -20 | while read f; do
                echo "Copying: $f"
                cp "$f" SwiftSupport/iphoneos/
              done
            fi
            echo "=== SwiftSupport contents ==="
            ls -la SwiftSupport/iphoneos/ 2>/dev/null || echo "EMPTY!"
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              echo "WARNING: SwiftSupport is empty, App Store may reject"
            fi
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol.ipa Payload SwiftSupport
            rm -rf Payload SwiftSupport
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol.ipa Payload
            rm -rf Payload
          fi

      # AkJol Courier iOS
      - name: Build AkJol Pro iOS
        timeout-minutes: 15
        run: |
          cd apps/courier
          flutter pub get
                    if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            flutter build ios --release --no-codesign
            security unlock-keychain -p "" ~/Library/Keychains/build.keychain
            echo "=== Available signing identities ==="
            security find-identity -v -p codesigning ~/Library/Keychains/build.keychain
            IDENTITY=$(security find-identity -v -p codesigning ~/Library/Keychains/build.keychain | grep -E "Distribution|Developer" | head -1 | awk -F'"' '{print $2}')
            echo "Signing with: $IDENTITY"
            cp ~/Library/MobileDevice/Provisioning\ Profiles/AkJolPro.mobileprovision build/ios/iphoneos/Runner.app/embedded.mobileprovision
            security cms -D -i build/ios/iphoneos/Runner.app/embedded.mobileprovision > /tmp/profile_courier.plist
            /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/profile_courier.plist > /tmp/entitlements_courier.plist
            find build/ios/iphoneos/Runner.app/Frameworks -name "*.framework" -o -name "*.dylib" | while read f; do
              codesign --force --sign "$IDENTITY" --timestamp=none "$f"
            done
            codesign --force --sign "$IDENTITY" --entitlements /tmp/entitlements_courier.plist --timestamp=none --options=runtime build/ios/iphoneos/Runner.app
            codesign --verify --verbose build/ios/iphoneos/Runner.app
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p SwiftSupport/iphoneos
            if xcrun -find swift-stdlib-tool >/dev/null 2>&1; then
              xcrun swift-stdlib-tool --copy --platform iphoneos \
                --scan-executable Payload/Runner.app/Runner \
                --destination SwiftSupport/iphoneos/ 2>/dev/null || true
            fi
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              for SWIFT_PATH in \
                "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "$(xcode-select -p)/../Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.0.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos"; do
                if [ -d "$SWIFT_PATH" ] && [ "$(ls -A "$SWIFT_PATH"/libswift* 2>/dev/null)" ]; then
                  cp "$SWIFT_PATH"/libswift* SwiftSupport/iphoneos/ 2>/dev/null || true
                  break
                fi
              done
            fi
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              find /Applications/Xcode* -path "*/iphoneos/libswift*" -type f 2>/dev/null | head -20 | while read f; do
                cp "$f" SwiftSupport/iphoneos/
              done
            fi
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol_Pro.ipa Payload SwiftSupport
            rm -rf Payload SwiftSupport
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol_Pro.ipa Payload
            rm -rf Payload
          fi

      # TakEsep Warehouse iOS
      - name: Build TakEsep iOS
        timeout-minutes: 15
        run: |
          cd apps/warehouse
          flutter pub get
                    if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            flutter build ios --release --no-codesign
            security unlock-keychain -p "" ~/Library/Keychains/build.keychain
            echo "=== Available signing identities ==="
            security find-identity -v -p codesigning ~/Library/Keychains/build.keychain
            IDENTITY=$(security find-identity -v -p codesigning ~/Library/Keychains/build.keychain | grep -E "Distribution|Developer" | head -1 | awk -F'"' '{print $2}')
            echo "Signing with: $IDENTITY"
            cp ~/Library/MobileDevice/Provisioning\ Profiles/TakEsep.mobileprovision build/ios/iphoneos/Runner.app/embedded.mobileprovision
            security cms -D -i build/ios/iphoneos/Runner.app/embedded.mobileprovision > /tmp/profile_warehouse.plist
            /usr/libexec/PlistBuddy -x -c "Print :Entitlements" /tmp/profile_warehouse.plist > /tmp/entitlements_warehouse.plist
            find build/ios/iphoneos/Runner.app/Frameworks -name "*.framework" -o -name "*.dylib" | while read f; do
              codesign --force --sign "$IDENTITY" --timestamp=none "$f"
            done
            codesign --force --sign "$IDENTITY" --entitlements /tmp/entitlements_warehouse.plist --timestamp=none --options=runtime build/ios/iphoneos/Runner.app
            codesign --verify --verbose build/ios/iphoneos/Runner.app
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p SwiftSupport/iphoneos
            if xcrun -find swift-stdlib-tool >/dev/null 2>&1; then
              xcrun swift-stdlib-tool --copy --platform iphoneos \
                --scan-executable Payload/Runner.app/Runner \
                --destination SwiftSupport/iphoneos/ 2>/dev/null || true
            fi
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              for SWIFT_PATH in \
                "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "$(xcode-select -p)/../Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos" \
                "/Applications/Xcode_26.0.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos"; do
                if [ -d "$SWIFT_PATH" ] && [ "$(ls -A "$SWIFT_PATH"/libswift* 2>/dev/null)" ]; then
                  cp "$SWIFT_PATH"/libswift* SwiftSupport/iphoneos/ 2>/dev/null || true
                  break
                fi
              done
            fi
            if [ ! "$(ls -A SwiftSupport/iphoneos/ 2>/dev/null)" ]; then
              find /Applications/Xcode* -path "*/iphoneos/libswift*" -type f 2>/dev/null | head -20 | while read f; do
                cp "$f" SwiftSupport/iphoneos/
              done
            fi
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/TakEsep.ipa Payload SwiftSupport
            rm -rf Payload SwiftSupport
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/TakEsep.ipa Payload
            rm -rf Payload
          fi

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: ios-ipas/*.ipa
          if-no-files-found: warn

  # ═══════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════
  release:
    needs: [build-windows, build-android-apks, build-android-aabs, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: ./artifacts/android-apks

      - name: Download Android AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-aabs
          path: ./artifacts/android-aabs

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-ipas
          path: ./artifacts/ios

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          BUILD=$(grep 'version:' apps/warehouse/pubspec.yaml | head -1 | sed 's/.*+//')
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TakEsep v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## TakEsep Экосистема v${{ steps.version.outputs.version }}

            ### 📦 Приложения
            - **TakEsep** — управление складом и продажами (Windows + Android)
            - **AkJol** — приложение для покупателей (Android + iOS)
            - **AkJol Pro** — приложение для курьеров (Android + iOS)
            - **Веб-админка** — [axeronisd.github.io/TakEsep/admin.html](https://axeronisd.github.io/TakEsep/admin.html)

            ### 📥 Скачать
            | Приложение | Платформа | Файл |
            |---|---|---|
            | TakEsep | Windows | `TakEsep_Setup.exe` |
            | TakEsep | Android (APK) | `TakEsep.apk` |
            | TakEsep | Android (AAB) | `TakEsep.aab` |
            | AkJol | Android (APK) | `AkJol.apk` |
            | AkJol | Android (AAB) | `AkJol.aab` |
            | AkJol Pro | Android (APK) | `AkJol_Pro.apk` |
            | AkJol Pro | Android (AAB) | `AkJol_Pro.aab` |
            | AkJol | iOS | `AkJol.ipa` |
            | AkJol Pro | iOS | `AkJol_Pro.ipa` |
          files: |
            ./artifacts/windows/TakEsep_Setup.exe
            ./artifacts/android-apks/TakEsep.apk
            ./artifacts/android-apks/AkJol_Pro.apk
            ./artifacts/android-apks/AkJol.apk
            ./artifacts/android-aabs/TakEsep.aab
            ./artifacts/android-aabs/AkJol_Pro.aab
            ./artifacts/android-aabs/AkJol.aab
            ./artifacts/ios/TakEsep.ipa
            ./artifacts/ios/AkJol.ipa
            ./artifacts/ios/AkJol_Pro.ipa

      - name: Update Supabase app_versions
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "⚠️ Supabase secrets not configured — skipping app_versions update"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build_number }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep_Setup.exe"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep.apk"

          # Insert Windows version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"windows\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${WIN_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}" || true

          # Insert Android version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"android\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${APK_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}" || true

          echo "✅ Supabase updated with v${VERSION} (build ${BUILD})"

  # ═══════════════════════════════════════════════
  # Upload to Google Play (Internal Testing)
  # ═══════════════════════════════════════════════
  upload-google-play:
    needs: [build-android-aabs, release]
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Download AABs
        uses: actions/download-artifact@v4
        with:
          name: android-aabs
          path: ./artifacts/android-aabs

      - name: Upload TakEsep to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.takesep.app
          releaseFiles: ./artifacts/android-aabs/TakEsep.aab
          track: internal
          status: draft

      - name: Upload AkJol to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.akjolui.customer
          releaseFiles: ./artifacts/android-aabs/AkJol.aab
          track: internal
          status: draft

      - name: Upload AkJol Pro to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.akjolui.courier
          releaseFiles: ./artifacts/android-aabs/AkJol_Pro.aab
          track: internal
          status: draft

  # ═══════════════════════════════════════════════
  # Upload to App Store Connect (TestFlight)
  # ═══════════════════════════════════════════════
  upload-testflight:
    needs: [build-ios, release]
    runs-on: macos-latest
    env:
      APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
    steps:
      - name: Download iOS IPAs
        uses: actions/download-artifact@v4
        with:
          name: ios-ipas
          path: ./artifacts/ios

      - name: Upload AkJol to TestFlight
        if: ${{ env.APPSTORE_API_KEY_ID != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ./artifacts/ios/AkJol.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload AkJol Pro to TestFlight
        if: ${{ env.APPSTORE_API_KEY_ID != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ./artifacts/ios/AkJol_Pro.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload TakEsep to TestFlight
        if: ${{ env.APPSTORE_API_KEY_ID != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ./artifacts/ios/TakEsep.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
