name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Triggered on version tags like v2.0

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════
  # Build Windows Installer (TakEsep Warehouse)
  # ═══════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: |
          cd apps/warehouse
          flutter pub get

      - name: Build Windows
        run: |
          cd apps/warehouse
          flutter build windows --release

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Download VC++ Redistributable
        run: |
          cd apps/warehouse
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"

      - name: Build Installer with build.iss
        run: |
          cd apps/warehouse
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "build.iss"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/warehouse/build/windows/x64/runner/Release/TakEsep_Setup.exe

  # ═══════════════════════════════════════════════
  # Build All Android APKs (GitHub Releases / Sideload)
  # ═══════════════════════════════════════════════
  build-android-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # TakEsep Warehouse APK
      - name: Build TakEsep APK
        run: |
          cd apps/warehouse
          flutter pub get
          flutter build apk --release

      - name: Rename TakEsep APK
        run: |
          cp apps/warehouse/build/app/outputs/flutter-apk/app-release.apk TakEsep.apk

      # AkJol Pro APK
      - name: Build AkJol Pro APK
        run: |
          cd apps/courier
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol Pro APK
        run: |
          cp apps/courier/build/app/outputs/flutter-apk/app-release.apk AkJol_Pro.apk

      # AkJol APK
      - name: Build AkJol APK
        run: |
          cd apps/customer
          flutter pub get
          flutter build apk --release

      - name: Rename AkJol APK
        run: |
          cp apps/customer/build/app/outputs/flutter-apk/app-release.apk AkJol.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            TakEsep.apk
            AkJol_Pro.apk
            AkJol.apk

  # ═══════════════════════════════════════════════
  # Build All Android AABs (Google Play Store)
  # ═══════════════════════════════════════════════
  build-android-aabs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Android signing
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$UPLOAD_KEYSTORE_BASE64" ]; then
            echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
            for app in warehouse courier customer; do
              echo "storePassword=$KEYSTORE_PASSWORD" > apps/$app/android/key.properties
              echo "keyPassword=$KEY_PASSWORD" >> apps/$app/android/key.properties
              echo "keyAlias=$KEY_ALIAS" >> apps/$app/android/key.properties
              echo "storeFile=${{ github.workspace }}/upload-keystore.jks" >> apps/$app/android/key.properties
            done
            echo "✅ Android signing configured"
          else
            echo "⚠️ No signing secrets found — AABs will use debug signing"
          fi

      # TakEsep Warehouse AAB
      - name: Build TakEsep AAB
        run: |
          cd apps/warehouse
          flutter pub get
          flutter build appbundle --release

      - name: Rename TakEsep AAB
        run: |
          cp apps/warehouse/build/app/outputs/bundle/release/app-release.aab TakEsep.aab

      # AkJol Pro AAB
      - name: Build AkJol Pro AAB
        run: |
          cd apps/courier
          flutter pub get
          flutter build appbundle --release

      - name: Rename AkJol Pro AAB
        run: |
          cp apps/courier/build/app/outputs/bundle/release/app-release.aab AkJol_Pro.aab

      # AkJol AAB
      - name: Build AkJol AAB
        run: |
          cd apps/customer
          flutter pub get
          flutter build appbundle --release

      - name: Rename AkJol AAB
        run: |
          cp apps/customer/build/app/outputs/bundle/release/app-release.aab AkJol.aab

      - name: Upload AABs
        uses: actions/upload-artifact@v4
        with:
          name: android-aabs
          path: |
            TakEsep.aab
            AkJol_Pro.aab
            AkJol.aab

  # ═══════════════════════════════════════════════
  # Build iOS IPAs (App Store Connect)
  # ═══════════════════════════════════════════════
  build-ios:
    runs-on: macos-latest
    env:
      IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
      IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
      IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64 }}
      IOS_PROVISIONING_PROFILE_COURIER_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_COURIER_BASE64 }}
      IOS_PROVISIONING_PROFILE_WAREHOUSE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_WAREHOUSE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Import Distribution Certificate
        if: ${{ env.IOS_DISTRIBUTION_P12_BASE64 != '' }}
        run: |
          echo "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > ios_distribution.p12
          security create-keychain -p "" build.keychain
          security import ios_distribution.p12 -t agg -k ~/Library/Keychains/build.keychain -P "$IOS_DISTRIBUTION_P12_PASSWORD" -A
          security list-keychains -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "" ~/Library/Keychains/build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

      - name: Import Provisioning Profiles
        if: ${{ env.IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64 != '' }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_CUSTOMER_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AkJolCustomer.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_COURIER_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AkJolPro.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_WAREHOUSE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/TakEsep.mobileprovision
          echo "✅ Provisioning profiles imported"

      # AkJol Customer iOS
      - name: Build AkJol iOS
        run: |
          cd apps/customer
          flutter pub get
          if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            cat > ios/export_options.plist << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store-connect</string>
                <key>teamID</key>
                <string>V63B2H2DTP</string>
                <key>signingStyle</key>
                <string>manual</string>
                <key>provisioningProfiles</key>
                <dict>
                    <key>com.akjolui.customer</key>
                    <string>AkJolCustomer</string>
                </dict>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>stripSwiftSymbols</key>
                <true/>
            </dict>
            </plist>
            EOF
            flutter build ipa --release --export-options-plist=ios/export_options.plist
            mkdir -p ../../ios-ipas
            cp build/ios/ipa/*.ipa ../../ios-ipas/AkJol.ipa
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol.ipa Payload
            rm -rf Payload
          fi

      # AkJol Courier iOS
      - name: Build AkJol Pro iOS
        run: |
          cd apps/courier
          flutter pub get
          if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            cat > ios/export_options.plist << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store-connect</string>
                <key>teamID</key>
                <string>V63B2H2DTP</string>
                <key>signingStyle</key>
                <string>manual</string>
                <key>provisioningProfiles</key>
                <dict>
                    <key>com.akjolui.courier</key>
                    <string>AkJolPro</string>
                </dict>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>stripSwiftSymbols</key>
                <true/>
            </dict>
            </plist>
            EOF
            flutter build ipa --release --export-options-plist=ios/export_options.plist
            mkdir -p ../../ios-ipas
            cp build/ios/ipa/*.ipa ../../ios-ipas/AkJol_Pro.ipa
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/AkJol_Pro.ipa Payload
            rm -rf Payload
          fi

      # TakEsep Warehouse iOS
      - name: Build TakEsep iOS
        run: |
          cd apps/warehouse
          flutter pub get
          if [ -n "$IOS_DISTRIBUTION_P12_BASE64" ]; then
            cat > ios/export_options.plist << 'EOF'
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>method</key>
                <string>app-store-connect</string>
                <key>teamID</key>
                <string>V63B2H2DTP</string>
                <key>signingStyle</key>
                <string>manual</string>
                <key>provisioningProfiles</key>
                <dict>
                    <key>com.takesep.app</key>
                    <string>TakEsep</string>
                </dict>
                <key>uploadBitcode</key>
                <false/>
                <key>uploadSymbols</key>
                <true/>
                <key>stripSwiftSymbols</key>
                <true/>
            </dict>
            </plist>
            EOF
            flutter build ipa --release --export-options-plist=ios/export_options.plist
            mkdir -p ../../ios-ipas
            cp build/ios/ipa/*.ipa ../../ios-ipas/TakEsep.ipa
          else
            flutter build ios --release --no-codesign
            mkdir -p Payload
            cp -r build/ios/iphoneos/Runner.app Payload/
            mkdir -p ../../ios-ipas
            zip -r ../../ios-ipas/TakEsep.ipa Payload
            rm -rf Payload
          fi

      - name: Upload iOS IPAs
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipas
          path: ios-ipas/*.ipa
          if-no-files-found: warn

  # ═══════════════════════════════════════════════
  # Create GitHub Release
  # ═══════════════════════════════════════════════
  release:
    needs: [build-windows, build-android-apks, build-android-aabs, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts/windows

      - name: Download Android APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: ./artifacts/android-apks

      - name: Download Android AAB artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-aabs
          path: ./artifacts/android-aabs

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-ipas
          path: ./artifacts/ios

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          BUILD=$(grep 'version:' apps/warehouse/pubspec.yaml | head -1 | sed 's/.*+//')
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TakEsep v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          body: |
            ## TakEsep Экосистема v${{ steps.version.outputs.version }}

            ### 📦 Приложения
            - **TakEsep** — управление складом и продажами (Windows + Android)
            - **AkJol** — приложение для покупателей (Android + iOS)
            - **AkJol Pro** — приложение для курьеров (Android + iOS)
            - **Веб-админка** — [axeronisd.github.io/TakEsep/admin.html](https://axeronisd.github.io/TakEsep/admin.html)

            ### 📥 Скачать
            | Приложение | Платформа | Файл |
            |---|---|---|
            | TakEsep | Windows | `TakEsep_Setup.exe` |
            | TakEsep | Android (APK) | `TakEsep.apk` |
            | TakEsep | Android (AAB) | `TakEsep.aab` |
            | AkJol | Android (APK) | `AkJol.apk` |
            | AkJol | Android (AAB) | `AkJol.aab` |
            | AkJol Pro | Android (APK) | `AkJol_Pro.apk` |
            | AkJol Pro | Android (AAB) | `AkJol_Pro.aab` |
            | AkJol | iOS | `AkJol.ipa` |
            | AkJol Pro | iOS | `AkJol_Pro.ipa` |
          files: |
            ./artifacts/windows/TakEsep_Setup.exe
            ./artifacts/android-apks/TakEsep.apk
            ./artifacts/android-apks/AkJol_Pro.apk
            ./artifacts/android-apks/AkJol.apk
            ./artifacts/android-aabs/TakEsep.aab
            ./artifacts/android-aabs/AkJol_Pro.aab
            ./artifacts/android-aabs/AkJol.aab
            ./artifacts/ios/TakEsep.ipa
            ./artifacts/ios/AkJol.ipa
            ./artifacts/ios/AkJol_Pro.ipa

      - name: Update Supabase app_versions
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "⚠️ Supabase secrets not configured — skipping app_versions update"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build_number }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep_Setup.exe"
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/TakEsep.apk"

          # Insert Windows version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"windows\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${WIN_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}" || true

          # Insert Android version
          curl -s -X POST "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"platform\":\"android\",\"version\":\"${VERSION}\",\"build_number\":${BUILD},\"download_url\":\"${APK_URL}\",\"release_notes\":\"Обновление v${VERSION}\"}" || true

          echo "✅ Supabase updated with v${VERSION} (build ${BUILD})"

  # ═══════════════════════════════════════════════
  # Upload to Google Play (Internal Testing)
  # ═══════════════════════════════════════════════
  upload-google-play:
    needs: [build-android-aabs, release]
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Download AABs
        uses: actions/download-artifact@v4
        with:
          name: android-aabs
          path: ./artifacts/android-aabs

      - name: Upload TakEsep to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.takesep.app
          releaseFiles: ./artifacts/android-aabs/TakEsep.aab
          track: internal
          status: draft

      - name: Upload AkJol to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.akjolui.customer
          releaseFiles: ./artifacts/android-aabs/AkJol.aab
          track: internal
          status: draft

      - name: Upload AkJol Pro to Google Play
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.akjolui.courier
          releaseFiles: ./artifacts/android-aabs/AkJol_Pro.aab
          track: internal
          status: draft

  # ═══════════════════════════════════════════════
  # Upload to App Store Connect (TestFlight)
  # ═══════════════════════════════════════════════
  upload-testflight:
    needs: [build-ios, release]
    runs-on: macos-latest
    env:
      APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
    steps:
      - name: Download iOS IPAs
        uses: actions/download-artifact@v4
        with:
          name: ios-ipas
          path: ./artifacts/ios

      - name: Upload AkJol to TestFlight
        if: ${{ env.APPSTORE_API_KEY_ID != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ./artifacts/ios/AkJol.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Upload AkJol Pro to TestFlight
        if: ${{ env.APPSTORE_API_KEY_ID != '' }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ./artifacts/ios/AkJol_Pro.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
