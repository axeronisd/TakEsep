<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TakEsep Admin — Закрытый доступ</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6C5CE7;
      --primary-light: #A29BFE;
      --accent: #00D2FF;
      --bg: #06060b;
      --surface: rgba(255,255,255,0.03);
      --surface-border: rgba(255,255,255,0.06);
      --text: #f0f0f5;
      --text-secondary: #6e6e82;
      --text-tertiary: #464660;
      --error: #FF6B6B;
      --success: #3DDC84;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,92,231,0.06), transparent 70%);
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 0 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(20px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(108,92,231,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--primary-light);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .login-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .login-header p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--surface-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      border-color: rgba(108,92,231,0.4);
      box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
    }

    .form-group input::placeholder {
      color: var(--text-tertiary);
    }

    .error-msg {
      display: none;
      font-size: 0.8rem;
      color: var(--error);
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(255,107,107,0.08);
      border-radius: 8px;
      border: 1px solid rgba(255,107,107,0.15);
    }

    .error-msg.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--primary), #5A4BD1);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,92,231,0.25);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--primary-light); }

    .hint {
      text-align: center;
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="noise"></div>

  <div class="login-container">
    <div class="login-card" id="loginForm">
      <div class="login-header">
        <div class="login-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h1>TakEsep Админ</h1>
        <p>Введите ключ доступа для входа в панель управления</p>
      </div>

      <div class="form-group">
        <label for="accessKey">Ключ доступа</label>
        <input type="password" id="accessKey" placeholder="Введите ключ..." autocomplete="off" autofocus>
      </div>

      <div class="error-msg" id="errorMsg">Неверный ключ доступа. Попробуйте снова.</div>

      <button class="submit-btn" id="submitBtn" onclick="checkAccess()">
        Войти в админ-панель
      </button>

      <a href="index.html" class="back-link">← Вернуться на главную</a>

      <p class="hint">
        Доступ только для администраторов.<br>
        Ключ можно получить у владельца бизнеса.
      </p>
    </div>
  </div>

  <script>
    /*
     * Client-side access gate for the admin web app.
     *
     * HOW TO CHANGE THE PASSWORD:
     * 1. Open browser console on this page
     * 2. Run: crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_NEW_PASSWORD'))
     *         .then(h => console.log(Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')))
     * 3. Copy the hash and replace ACCESS_KEY_HASH below
     *
     * Current default password: "password"
     */
    const ACCESS_KEY_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8';

    // If already authenticated, go directly to the app
    if (sessionStorage.getItem('takesep_admin_auth') === 'true') {
      window.location.replace('app/');
    }

    document.getElementById('accessKey').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkAccess();
    });

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkAccess() {
      const key = document.getElementById('accessKey').value.trim();
      if (!key) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Проверка...';

      const hash = await sha256(key);

      // Small delay for UX
      await new Promise(r => setTimeout(r, 600));

      if (hash === ACCESS_KEY_HASH) {
        sessionStorage.setItem('takesep_admin_auth', 'true');
        btn.innerHTML = '✓ Доступ подтверждён';
        btn.style.background = 'linear-gradient(135deg, #3DDC84, #00A956)';
        setTimeout(() => {
          window.location.replace('app/');
        }, 500);
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Войти в админ-панель';
        document.getElementById('errorMsg').classList.add('visible');
        document.getElementById('accessKey').style.borderColor = 'rgba(255,107,107,0.4)';
        document.getElementById('accessKey').focus();
        document.getElementById('accessKey').select();
        setTimeout(() => {
          document.getElementById('errorMsg').classList.remove('visible');
          document.getElementById('accessKey').style.borderColor = '';
        }, 3000);
      }
    }
  </script>
</body>
</html>
